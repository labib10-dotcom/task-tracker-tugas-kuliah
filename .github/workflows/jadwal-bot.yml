name: Auto Bot Tracker UT

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  jalankan-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil Kodingan
        uses: actions/checkout@v4

      - name: Siapin Mesin Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Bikin File env
        run: |
          echo "UT_NIM=${{ secrets.UT_NIM }}" >> .env
          echo "UT_PASS=${{ secrets.UT_PASS }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

      - name: Masak Kodingan
        run: mvn clean package

      - name: Jalanin Bot
        run: sh -c "java -jar target/*-jar-with-dependencies.jar"